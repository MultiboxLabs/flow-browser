name: Electron Version Updater

on:
  # Run every hour
  schedule:
    - cron: "0 * * * *"

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade-electron-current-major:
    if: github.repository == 'MultiboxLabs/flow-browser'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.10

      - name: Install Dependencies
        run: bun install --development --frozen-lockfile

      - name: Run Electron Current Major Version Upgrade Script
        id: upgrade-current-major
        run: |
          # Capture the output to extract version
          OUTPUT=$(bun run script:upgrade-electron-to-current 2>&1)
          echo "$OUTPUT"

          # Extract version from output
          VERSION=$(echo "$OUTPUT" | grep "Latest version in current major version:" | sed 's/Latest version in current major version: //')
          if [ -n "$VERSION" ]; then
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "No valid version found. Exiting workflow."
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if update is needed
        id: check-current-major
        run: |
          VERSION="${{ steps.upgrade-current-major.outputs.version }}"
          BRANCH="workflow/bump-electron-current-major"

          # Check if there are any file changes from the upgrade script
          if git diff --quiet; then
            echo "No file changes detected. Skipping."
            echo "should_update=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if an open PR already exists for this branch
          PR_JSON=$(gh pr list --head "$BRANCH" --state open --json number,title --jq '.[0] // empty')
          if [ -n "$PR_JSON" ]; then
            PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
            PR_TITLE=$(echo "$PR_JSON" | jq -r '.title')

            # If PR already targets this exact version, skip to avoid unnecessary force push
            if echo "$PR_TITLE" | grep -qF "$VERSION"; then
              echo "PR #$PR_NUMBER already targets version $VERSION. Skipping."
              echo "should_update=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            # PR exists but targets a different version - check for manual commits
            REMOTE_REF=$(git ls-remote --heads origin "$BRANCH" | awk '{print $1}')
            if [ -n "$REMOTE_REF" ]; then
              git fetch origin "$BRANCH" --quiet
              # Count commits on the PR branch not authored by github-actions[bot]
              MANUAL_COMMITS=$(git log "origin/main..origin/$BRANCH" --format='%an' | grep -cv 'github-actions\[bot\]' || true)
              if [ "$MANUAL_COMMITS" -gt 0 ]; then
                echo "PR #$PR_NUMBER has $MANUAL_COMMITS manual commit(s). Skipping to preserve changes."
                gh pr comment "$PR_NUMBER" --body "A newer Electron version **$VERSION** is available, but this PR has manual commits so it was not automatically updated. Please update manually or close this PR to allow a new one to be created."
                echo "should_update=false" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi
          fi

          echo "should_update=true" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        if: steps.check-current-major.outputs.should_update == 'true'
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump electron to ${{ steps.upgrade-current-major.outputs.version }} [CURRENT MAJOR]"
          title: "Bump Electron to ${{ steps.upgrade-current-major.outputs.version }} [CURRENT MAJOR]"
          body: |
            ## Electron Version Update (Current Major Version)

            This PR updates Electron to the latest current major version: **${{ steps.upgrade-current-major.outputs.version }}**

            ### Changes
            - Updated `package.json` electron dependency
            - Updated `bun.lock` with new electron version and commit hash

            ### Auto-generated
            This PR was automatically generated by the Electron Version Updater workflow.
          branch: workflow/bump-electron-current-major
          delete-branch: true
          labels: |
            dependencies
            electron

  upgrade-electron-next-major:
    if: github.repository == 'MultiboxLabs/flow-browser'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.10

      - name: Install Dependencies
        run: bun install --development --frozen-lockfile

      - name: Run Electron Next Major Version Upgrade Script
        id: upgrade-next-major
        run: |
          # Capture the output to extract version
          OUTPUT=$(bun run script:upgrade-electron-to-next 2>&1)
          echo "$OUTPUT"

          # Extract version from output
          VERSION=$(echo "$OUTPUT" | grep "Latest version in next major version:" | sed 's/Latest version in next major version: //')
          if [ -n "$VERSION" ]; then
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "No valid version found. Exiting workflow."
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if update is needed
        id: check-next-major
        run: |
          VERSION="${{ steps.upgrade-next-major.outputs.version }}"
          BRANCH="workflow/bump-electron-next-major"

          # Check if there are any file changes from the upgrade script
          if git diff --quiet; then
            echo "No file changes detected. Skipping."
            echo "should_update=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if an open PR already exists for this branch
          PR_JSON=$(gh pr list --head "$BRANCH" --state open --json number,title --jq '.[0] // empty')
          if [ -n "$PR_JSON" ]; then
            PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
            PR_TITLE=$(echo "$PR_JSON" | jq -r '.title')

            # If PR already targets this exact version, skip to avoid unnecessary force push
            if echo "$PR_TITLE" | grep -qF "$VERSION"; then
              echo "PR #$PR_NUMBER already targets version $VERSION. Skipping."
              echo "should_update=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            # PR exists but targets a different version - check for manual commits
            REMOTE_REF=$(git ls-remote --heads origin "$BRANCH" | awk '{print $1}')
            if [ -n "$REMOTE_REF" ]; then
              git fetch origin "$BRANCH" --quiet
              # Count commits on the PR branch not authored by github-actions[bot]
              MANUAL_COMMITS=$(git log "origin/main..origin/$BRANCH" --format='%an' | grep -cv 'github-actions\[bot\]' || true)
              if [ "$MANUAL_COMMITS" -gt 0 ]; then
                echo "PR #$PR_NUMBER has $MANUAL_COMMITS manual commit(s). Skipping to preserve changes."
                gh pr comment "$PR_NUMBER" --body "A newer Electron version **$VERSION** is available, but this PR has manual commits so it was not automatically updated. Please update manually or close this PR to allow a new one to be created."
                echo "should_update=false" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi
          fi

          echo "should_update=true" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        if: steps.check-next-major.outputs.should_update == 'true'
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump electron to ${{ steps.upgrade-next-major.outputs.version }} [NEXT MAJOR]"
          title: "Bump Electron to ${{ steps.upgrade-next-major.outputs.version }} [NEXT MAJOR]"
          body: |
            ## Electron Version Update (Next Major Version)

            This PR updates Electron to the latest next major version: **${{ steps.upgrade-next-major.outputs.version }}**

            ### Changes
            - Updated `package.json` electron dependency
            - Updated `bun.lock` with new electron version and commit hash
            - Bump target versions in electron-updater configuration.

            ### Auto-generated
            This PR was automatically generated by the Electron Version Updater workflow.
          branch: workflow/bump-electron-next-major
          draft: true
          delete-branch: true
          labels: |
            dependencies
            electron
